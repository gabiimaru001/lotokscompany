<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Listings — Lotoks Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="bg-surface-low">

<aside class="sidebar" id="sidebar">
    <div class="mb-5">
        <a class="navbar-brand text-white fs-3" href="../index.html">Lotoks<span class="text-tertiary">.</span></a>
        <div class="badge badge-warning x-small d-block mt-2">Admin Portal</div>
    </div>
    <nav class="d-flex flex-column gap-2">
        <a href="queue.html" class="sidebar-link"><i class="fa-solid fa-list-check"></i> Queue</a>
        <a href="listings.html" class="sidebar-link active"><i class="fa-solid fa-briefcase"></i> Listings</a>
        <a href="payments.html" class="sidebar-link"><i class="fa-solid fa-credit-card"></i> Payments</a>
        <a href="staff.html" class="sidebar-link"><i class="fa-solid fa-users"></i> Staff</a>
        <a href="config.html" class="sidebar-link mt-auto"><i class="fa-solid fa-gear"></i> System Config</a>
        <a href="languages.html" class="sidebar-link"><i class="fa-solid fa-language"></i> i18n</a>
    </nav>
</aside>

<main class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="mb-1">Manage Listings</h2>
            <p class="text-muted small">Create and edit sponsorship opportunities for users.</p>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openListing()"><i class="fa-solid fa-plus me-1"></i> New Listing</button>
    </header>

    <div class="card p-0 border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="bg-surface-low">
                    <tr>
                        <th class="ps-4 py-3 x-small fw-bold text-muted">TITLE</th>
                        <th class="py-3 x-small fw-bold text-muted">EMPLOYER</th>
                        <th class="py-3 x-small fw-bold text-muted">COUNTRY</th>
                        <th class="py-3 x-small fw-bold text-muted">TYPE</th>
                        <th class="py-3 x-small fw-bold text-muted">STATUS</th>
                        <th class="pe-4 py-3 x-small fw-bold text-muted text-end">ACTION</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="ps-4 fw-bold small">Registered Nurse</td>
                        <td class="small">NHS United Kingdom</td>
                        <td class="small">UK 🇬🇧</td>
                        <td><span class="badge badge-primary">Job</span></td>
                        <td><span class="badge badge-success">Active</span></td>
                        <td class="pe-4 text-end">
                            <button class="btn btn-link text-primary p-1"><i class="fa-solid fa-edit"></i></button>
                            <button class="btn btn-link text-danger p-1"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="../js/main.js"></script>
</body>
</html>
