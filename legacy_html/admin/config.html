<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Config — Lotoks Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="bg-surface-low">

<aside class="sidebar" id="sidebar">
    <div class="mb-5">
        <a class="navbar-brand text-white fs-3" href="../index.html">Lotoks<span class="text-tertiary">.</span></a>
        <div class="badge badge-warning x-small d-block mt-2">Admin Portal</div>
    </div>
    <nav class="d-flex flex-column gap-2">
        <a href="queue.html" class="sidebar-link"><i class="fa-solid fa-list-check"></i> Queue</a>
        <a href="listings.html" class="sidebar-link"><i class="fa-solid fa-briefcase"></i> Listings</a>
        <a href="payments.html" class="sidebar-link"><i class="fa-solid fa-credit-card"></i> Payments</a>
        <a href="staff.html" class="sidebar-link"><i class="fa-solid fa-users"></i> Staff</a>
        <a href="config.html" class="sidebar-link active mt-auto"><i class="fa-solid fa-gear"></i> System Config</a>
        <a href="languages.html" class="sidebar-link"><i class="fa-solid fa-language"></i> i18n</a>
        <a href="../index.html" class="sidebar-link border-0 bg-transparent text-start w-100"><i class="fa-solid fa-sign-out"></i> Logout</a>
    </nav>
</aside>

<main class="main-content">
    <header class="mb-5">
        <h2 class="mb-1">System Configuration</h2>
        <p class="text-muted small">Manage payment gateways, OTP settings, and global platform defaults.</p>
    </header>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card p-4 mb-4">
                <h5 class="fw-bold mb-4">Payment Gateways</h5>
                <div class="mb-4">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <i class="fa-brands fa-paypal fa-lg" style="color: #003087;"></i>
                        <span class="fw-bold">PayPal</span>
                        <span class="badge badge-success ms-auto">Active</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label small fw-bold">Client ID</label>
                            <input type="password" class="form-control" value="AZDxjDScFpQtjWTOUtWKbyN_bDt4OgqaF48Wbllq294W">
                        </div>
                    </div>
                </div>
                <hr class="my-4 opacity-10">
                <div class="mb-4">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <i class="fa-brands fa-stripe fa-lg" style="color: #635bff;"></i>
                        <span class="fw-bold">Stripe</span>
                        <span class="badge badge-success ms-auto">Active</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label small fw-bold">Secret Key</label>
                            <input type="password" class="form-control" value="sk_test_51ABC1234567890">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-4">
                <h5 class="fw-bold mb-4">OTP & Notifications</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">SMS Gateway</label>
                        <select class="form-select">
                            <option>Twilio</option>
                            <option>Termii</option>
                            <option>Infobip</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">OTP Expiry (Minutes)</label>
                        <input type="number" class="form-control" value="10">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4 mb-4" style="border-top: 4px solid var(--color-tertiary);">
                <h6 class="fw-bold mb-3">Platform Status</h6>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" checked>
                    <label class="form-check-label small">Accepting New Applications</label>
                </div>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" checked>
                    <label class="form-check-label small">Send Webhook Notifications</label>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label small">Maintenance Mode</label>
                </div>
            </div>
            
            <button class="btn btn-primary w-100 py-3" onclick="Utils.showToast('Configuration saved!')">Save All Settings</button>
        </div>
    </div>
</main>

<script src="../js/main.js"></script>
</body>
</html>
