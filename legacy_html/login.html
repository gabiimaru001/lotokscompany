<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Lotoks</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-surface-low d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="card p-5" style="width: 100%; max-width: 480px;">
    <div class="text-center mb-5">
        <a class="navbar-brand fs-2" href="index.html">Lotoks<span>.</span></a>
        <p class="text-muted small mt-2">Secure access to your sponsorship portal</p>
    </div>

    <div id="authView">
        <ul class="nav nav-pills mb-4 justify-content-center bg-light p-1 rounded-full" style="display: inline-flex; width: 100%;">
            <li class="nav-item flex-grow-1"><button class="nav-link active w-100 rounded-full" data-bs-toggle="pill" data-bs-target="#loginTab">Login</button></li>
            <li class="nav-item flex-grow-1"><button class="nav-link w-100 rounded-full" data-bs-toggle="pill" data-bs-target="#signupTab">Sign Up</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="loginTab">
                <div class="mb-4">
                    <label class="form-label fw-bold small">Email Address</label>
                    <input type="email" class="form-control" id="loginEmail" placeholder="name@company.com">
                </div>
                <button class="btn btn-primary w-100 py-3" onclick="showOtp()">Send Verification Code</button>
            </div>
            <div class="tab-pane fade" id="signupTab">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Full Name</label>
                    <input type="text" class="form-control" placeholder="Amina Okafor">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@company.com">
                </div>
                <button class="btn btn-primary w-100 py-3" onclick="showOtp()">Create Account</button>
            </div>
        </div>
    </div>

<div id="otpView" class="d-none" role="region" aria-label="OTP Verification">
        <div class="text-center mb-4">
            <h5 class="fw-bold">Verify Identity</h5>
            <p class="text-muted small">We've sent a 6-digit code to your email.</p>
        </div>
        <div class="otp-container d-flex justify-content-between gap-2 mb-4" role="group" aria-label="6-digit verification code entry">
            <input type="text" class="form-control text-center otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" aria-label="Digit 1" data-position="0">
            <input type="text" class="form-control text-center otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" aria-label="Digit 2" data-position="1">
            <input type="text" class="form-control text-center otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" aria-label="Digit 3" data-position="2">
            <input type="text" class="form-control text-center otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" aria-label="Digit 4" data-position="3">
            <input type="text" class="form-control text-center otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" aria-label="Digit 5" data-position="4">
            <input type="text" class="form-control text-center otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" aria-label="Digit 6" data-position="5">
        </div>
        <div class="otp-error text-center text-danger small mb-3 d-none" role="alert" aria-live="polite">
            Invalid verification code. Please try again.
        </div>
        <button class="btn btn-primary w-100 py-3 mb-3" onclick="verifyOtp()">Verify & Continue</button>
        <button class="btn btn-link w-100 text-muted small" onclick="resendCode()">Didn't get the code? <span class="text-primary">Resend</span></button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
function showOtp() {
    document.getElementById('authView').classList.add('d-none');
    document.getElementById('otpView').classList.remove('d-none');
    const firstInput = document.querySelector('.otp-input');
    if (firstInput) firstInput.focus();
}
function verifyOtp() {
    const inputs = document.querySelectorAll('.otp-input');
    const codes = Array.from(inputs).map(i => i.value);
    
    const errorEl = document.querySelector('.otp-error');
    const container = document.querySelector('.otp-container');
    
    if (codes.some(c => !/^\d$/.test(c))) {
        errorEl.classList.remove('d-none');
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 500);
        inputs.forEach(i => { if (!/^\d$/.test(i.value)) i.focus(); });
        return;
    }
    
    errorEl.classList.add('d-none');
    
    if (Auth.login('user@example.com', codes.join(''))) {
        Utils.showToast('Login successful!');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } else {
        Utils.showToast('Invalid code. Try ending with 0.', 'error');
        errorEl.classList.remove('d-none');
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 500);
        inputs.forEach(i => i.value = '');
        inputs[0].focus();
    }
}
function resendCode() {
    Utils.showToast('Code resent to your email.');
}
</script>
</body>
</html>
